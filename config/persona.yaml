  secondary:
    - "자기계발 & 영감"
    - "계절감 있는 일상"
    - "음악 & 감성"
  seasonal:
    spring: ["벚꽃", "피크닉", "봄 코디"]
    summer: ["바다", "여름 휴가", "시원한 카페"]
    autumn: ["단풍", "가을 감성", "따뜻한 음료"]
    winter: ["크리스마스", "겨울 패션", "따뜻한 실내"]

